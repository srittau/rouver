name: Test and lint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        name: Install uv
        with:
            python-version: ${{ matrix.python-version }}
      - name: Install Python packages
        run: uv sync --locked
      - name: Lint with ruff
        run: |
          uv run ruff --version
          uv run ruff check rouver rouver_test
      - name: Type checking with mypy
        run: |
          uv run mypy --version
          uv run mypy rouver rouver_test
      - name: Test with unittest
        run: uv run pytest
